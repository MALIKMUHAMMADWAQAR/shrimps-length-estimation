# Inference configuration for the full size-estimation pipeline.
log_file: logs/infer.log

model:
  num_classes: 1
  centerline:
    in_channels: 3
    mask_channels: 1
    num_classes: 1
    aspp_channels: 256
    atrous_rates: [6, 12, 18]
    decoder_channels: [128, 64, 48, 32]
    width_mult: 1.0

data:
  scene_size: 256

eval:
  centerline_threshold: 0.5
  mask_threshold: 0.5
  score_threshold: 0.3

# Calibration: millimetres per pixel obtained from a reference object of known
# size in the imaging setup (Section 2.5.2).
calibration:
  pixel_to_mm: 0.5

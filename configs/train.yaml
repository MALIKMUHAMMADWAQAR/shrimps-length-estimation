# Training configuration for the dual-segmentation shrimp framework.
seed: 42
log_file: logs/train.log
ckpt_dir: checkpoints

model:
  num_classes: 1
  centerline:
    in_channels: 3
    mask_channels: 1
    num_classes: 1
    aspp_channels: 256
    atrous_rates: [6, 12, 18]
    decoder_channels: [128, 64, 48, 32]
    width_mult: 1.0

data:
  image_size: [128, 128]
  scene_size: 256
  batch_size: 8
  num_workers: 2
  synthetic_samples: 64

# Centerline stage training protocol (paper Section 3.2.1).
train:
  epochs: 40
  lr: 0.02
  momentum: 0.9
  weight_decay: 0.0001
  lr_milestones: [24, 34]
  amp: false
  grad_clip: null
  loss:
    beta: 1.0          # weight on the BCE term in L_seg = L_Dice + beta * L_BCE

# Instance-segmentation stage training protocol (paper Section 3.1.1), for
# reference when training RTMDet with the official OpenMMLab pipeline.
detector:
  variant: rtmdet-ins-m
  epochs: 70
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  alpha: 2.0           # GIoU box-loss weight
  beta: 1.0            # mask BCE-loss weight

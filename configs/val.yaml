# Validation / evaluation configuration.
log_file: logs/eval.log

model:
  num_classes: 1
  centerline:
    in_channels: 3
    mask_channels: 1
    num_classes: 1
    aspp_channels: 256
    atrous_rates: [6, 12, 18]
    decoder_channels: [128, 64, 48, 32]
    width_mult: 1.0

data:
  image_size: [128, 128]
  batch_size: 8
  synthetic_samples: 32

eval:
  centerline_threshold: 0.5
  mask_threshold: 0.5
